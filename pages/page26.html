<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wake up your taste buds</title>
    <!-- Google Fonts: Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="../css/page26.css">
</head>

<body>

    <main class="wrapper">
        <div class="container">

            <!-- ==========================================
                 TOP HERO SECTION
                 ========================================== -->
            <section class="hero-split">

                <!-- Left Content -->
                <div class="hero-left">
                    <h1 class="main-title">
                        Wake up your<br>
                        taste buds with<br>
                        this <span class="highlight-red">juicy bite</span>
                    </h1>

                    <img src="../media/img26/Image%20(3).png" alt="Burger varieties" class="burger-circles">

                    <p class="main-desc">
                        Lorem ipsum dolor sit amet, consectetur<br>
                        adipiscing elit. Faucibus in libero risus.
                    </p>

                    <a href="#" class="btn-primary">Explore the menu</a>
                </div>

                <!-- Right Hero Image -->
                <div class="hero-right">
                    <!-- The glowing background element via CSS -->
                    <div class="glow-backdrop"></div>
                    <img src="../media/img26/unsplash_T8SD7bwyxHU.png" alt="Floating burger ingredients"
                        class="hero-main-img">
                </div>

            </section>

            <!-- ==========================================
                 BOTTOM PILL TABS
                 ========================================== -->
            <section class="bottom-tabs">

                <div class="tab-item">
                    <p class="tab-text">From farm to table</p>
                </div>

                <div class="tab-item">
                    <p class="tab-text">100% grass-feed beef</p>
                </div>

                <div class="tab-item">
                    <p class="tab-text">100% organic & natural</p>
                </div>

            </section>

        </div>
    </main>

</body>

</html>
