<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your ultimate fashion outfits</title>
    <!-- Google Fonts: Playfair Display for headings & Lora for body/italic text to match the editorial "Vogue" style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap"
        rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="../css/page18.css">
</head>

<body>

    <main class="wrapper">

        <!-- ==========================================
             HEADER SECTION
             ========================================== -->
        <header class="header">

            <!-- Left Decorative Cluster -->
            <div class="header-decor left-decor">
                <img src="../media/img18/Group.png" alt="" class="wavelines" aria-hidden="true">
                <img src="../media/img18/Frame 14260.png" alt="" class="circle-text" aria-hidden="true">
            </div>

            <!-- Center Content -->
            <div class="header-content">
                <h1 class="main-title">
                    Your ultimate<br>fashion outfits
                </h1>
                <p class="main-desc">
                    Lorem ipsum dolor sit amet, consectetur<br>
                    adipiscing elit. Faucibus in libero risus
                </p>
                <a href="#" class="btn-explore">Explore</a>
            </div>

            <!-- Right Decorative Cluster -->
            <div class="header-decor right-decor">
                <img src="../media/img18/Frame 14260.png" alt="" class="circle-text" aria-hidden="true">
                <img src="../media/img18/Group.png" alt="" class="wavelines" aria-hidden="true">
            </div>

        </header>

        <!-- ==========================================
             MASONRY GALLERY SECTION
             ========================================== -->
        <section class="gallery-grid">

            <!-- COLUMN 1 (Left) -->
            <div class="col col-1">
                <!-- Text box with blue dashed underline -->
                <div class="text-box-left">
                    <p>Exclusive gifts.</p>
                    <p>Insider access.</p>
                    <p>Special events.</p>
                    <div class="blue-line"></div>
                </div>
                <!-- Image 1 -->
                <img src="../media/img18/left.png" alt="Fashion portrait 1" class="img-standard">
                <!-- Image 2 -->
                <img src="../media/img18/Frame 14251.png" alt="Fashion pose in shopping cart" class="img-standard">
            </div>

            <!-- COLUMN 2 (Center-Left) -->
            <div class="col col-2">
                <img src="../media/img18/right.png" alt="Woman in profile lighting" class="img-standard">
            </div>

            <!-- COLUMN 3 (Center) - Tall Image -->
            <div class="col col-3">
                <img src="../media/img18/Middle.png" alt="Man in red suit" class="img-tall">
            </div>

            <!-- COLUMN 4 (Center-Right) -->
            <div class="col col-4">
                <img src="../media/img18/Frame 14248.png" alt="Two fashion models" class="img-standard">
                <img src="../media/img18/Frame 14249.png" alt="Woman lying down styled"
                    class="img-standard margin-top-gap">
            </div>

            <!-- COLUMN 5 (Right) -->
            <div class="col col-5">
                <img src="../media/img18/Frame 14252.png" alt="Man carrying bag on stairs" class="img-standard">
                <!-- Text box with solid black line -->
                <div class="text-box-right">
                    <p>Beauty</p>
                    <p>Fashion</p>
                    <p>Culture</p>
                    <div class="black-line"></div>
                </div>
            </div>

        </section>

    </main>

</body>

</html>
