<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A place you eat healthy</title>
    <!-- Google Fonts: Montserrat (geometric, friendly sans-serif matching the image) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="../css/page19.css">
</head>

<body>

    <main class="wrapper">

        <!-- ==========================================
             TOP HALF SECTION (Gray Background)
             ========================================== -->
        <section class="top-section">
            <div class="content-container">

                <!-- Left Text Block -->
                <div class="hero-text">
                    <h1 class="main-title">
                        A place you<br>eat healthy
                    </h1>
                    <p class="main-desc">
                        Lorem ipsum dolor sit amet, consectetur<br>
                        adipiscing elit. Faucibus in libero risus<br>
                        semper habitant arcu eget. Et integer<br>
                        facilisi eget. Lorem ipsum dolor.
                    </p>
                    <a href="#" class="btn-explore">Explore the menu</a>
                </div>

                <!-- Right Overlapping Big Image -->
                <div class="hero-image-wrap">
                    <img src="../media/img19/unsplash_yhc4pSbl01A.png" alt="Healthy salad bowl" class="main-bowl-img">
                </div>

            </div>
        </section>

        <!-- ==========================================
             BOTTOM HALF SECTION (White Background)
             ========================================== -->
        <section class="bottom-section">
            <div class="content-container flex-bottom">

                <!-- 3 Left Pillar Images (Overlapping the gray/white boundary) -->
                <div class="pill-gallery">
                    <img src="../media/img19/Rectangle 18.png" alt="Yellow background ingredients"
                        class="ingredient-pill">
                    <img src="../media/img19/Rectangle 19.png" alt="Green background ingredients"
                        class="ingredient-pill">
                    <img src="../media/img19/Rectangle 20.png" alt="White background ingredients"
                        class="ingredient-pill">
                </div>

                <!-- Right Chef Info Block -->
                <div class="chef-info">
                    <div class="black-line"></div>
                    <h3 class="chef-name">Chef ABC</h3>
                    <p class="chef-desc">
                        Lorem ipsum dolor sit amet, consectetur<br>
                        adipiscing elit. Faucibus in libero risus semper
                    </p>

                    <!-- 4 small circular ingredients -->
                    <div class="ingredients-circles">
                        <img src="../media/img19/Ellipse 3.png" alt="Tomato">
                        <img src="../media/img19/Ellipse 4.png" alt="Broccoli">
                        <img src="../media/img19/Ellipse 5.png" alt="Pear">
                        <img src="../media/img19/Ellipse 6.png" alt="Nuts">
                    </div>
                </div>

            </div>
        </section>

    </main>

</body>

</html>
