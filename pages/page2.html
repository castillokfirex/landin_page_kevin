<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page Nature</title>
    <!-- Google Fonts: Montserrat para titulares, Inter para texto principal -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <!-- CSS Link -->
    <link rel="stylesheet" href="../css/page2.css">
</head>
<body>
    <main class="container">
        <!-- Hero Section -->
        <section class="hero">
            <div class="hero-content">
                <h1>Discover the<br>beauty around<br>the world</h1>
                <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Faucibus in libero risus semper habitant arcu.</p>
                <a href="#" class="btn-primary">Get started</a>
            </div>
            
            <div class="hero-image-grid">
                <div class="img-wrapper col-left">
                    <img src="../media/img2/Image left.png" alt="Hojas con gotas de rocío">
                </div>
                <div class="img-wrapper col-right">
                    <img src="../media/img2/Image right.png" alt="Bosque con niebla">
                </div>
            </div>
        </section>

        <!-- Gallery Section -->
        <section class="gallery">
            <div class="gallery-item">
                <span class="number">01</span>
                <img src="../media/img2/5.png" alt="Vista superior del bosque">
            </div>
            <div class="gallery-item">
                <span class="number">02</span>
                <img src="../media/img2/5 (1).png" alt="Lago y montañas">
            </div>
            <div class="gallery-item">
                <span class="number">03</span>
                <img src="../media/img2/5 (2).png" alt="Campo con atardecer">
            </div>
        </section>
    </main>
</body>
</html>
