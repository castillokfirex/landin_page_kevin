<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design. Create. Inspire.</title>
    <!-- Fuentes: Outfit (Títulos impactantes) e Inter (Textos limpios) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Outfit:wght@700&display=swap"
        rel="stylesheet">
    <!-- Enlace al CSS de la página 10 -->
    <link rel="stylesheet" href="../css/page10.css">
</head>

<body>
    <main class="container">
        <!-- Layout dividido en 2 columnas (Texto Izquierda / Grilla Derecha) -->
        <div class="split-layout">

            <!-- --- Columna Izquierda: Textos y Botón --- -->
            <div class="column-left content-text">
                <h1 class="main-title">
                    <span class="word-design">Design.</span><br>
                    <span class="word-create">Create.</span><br>
                    <span class="word-inspire">Inspire.</span>
                </h1>

                <p class="description">
                    Lorem ipsum dolor sit amet,<br>
                    consectetur adipiscing elit. Faucibus<br>
                    in libero risus semper habitant arcu<br>
                    eget. Et integer facilisi eget.
                </p>

                <button class="btn">Explore</button>
            </div>

            <!-- --- Columna Derecha: Grilla 4x4 de imágenes --- -->
            <div class="column-right content-grid">

                <!-- Fila 1 -->
                <div class="grid-item"><img src="../media/img10/Frame 14195.png" alt="Teléfono retro amarillo"></div>
                <div class="grid-item"><img src="../media/img10/Frame 14196.png" alt="Taza de café vista aérea"></div>
                <div class="grid-item"><img src="../media/img10/Frame 14197.png" alt="Skateboard azul"></div>
                <div class="grid-item"><img src="../media/img10/Frame 14198.png" alt="Zapatilla curva"></div>

                <!-- Fila 2 -->
                <div class="grid-item"><img src="../media/img10/Frame 14195 (1).png" alt="Plato con taza centrado">
                </div>
                <div class="grid-item"><img src="../media/img10/Frame 14196 (1).png" alt="Dos donas rosadas"></div>
                <div class="grid-item"><img src="../media/img10/Frame 14197 (1).png"
                        alt="Naranja cortada sobre base amarilla"></div>
                <div class="grid-item"><img src="../media/img10/Frame 14198 (1).png" alt="Copa rosa"></div>

                <!-- Fila 3 -->
                <div class="grid-item"><img src="../media/img10/Frame 14195 (2).png" alt="Megáfono naranja"></div>
                <div class="grid-item"><img src="../media/img10/Frame 14196 (2).png" alt="Reloj clásico"></div>
                <div class="grid-item"><img src="../media/img10/Frame 14197 (2).png" alt="Piña azul creativa"></div>
                <div class="grid-item"><img src="../media/img10/Frame 14198 (2).png" alt="Rodajas de naranja y agua">
                </div>

                <!-- Fila 4 -->
                <div class="grid-item"><img src="../media/img10/Frame 14195 (3).png"
                        alt="Mano agarrando reloj despertador"></div>
                <div class="grid-item"><img src="../media/img10/Frame 14199.png" alt="Paleta sobre plato azul"></div>
                <div class="grid-item"><img src="../media/img10/Frame 14197 (3).png" alt="Limon azul oscuro partido">
                </div>
                <div class="grid-item"><img src="../media/img10/Frame 14198 (3).png" alt="Tetera o exprimidor amarillo">
                </div>

            </div>

        </div>
    </main>
</body>

</html>
