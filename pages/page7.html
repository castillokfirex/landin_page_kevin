<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design is the way</title>
    <!-- Fuentes: Outfit (Títulos y números atractivos) e Inter (Textos limpios) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Outfit:wght@500;600&display=swap"
        rel="stylesheet">
    <!-- Enlace al nuevo CSS de la página 7 -->
    <link rel="stylesheet" href="../css/page7.css">
</head>

<body>

        <header class="header">

                </div>
                <!-- Contenedor de la imagen con el texto incrustado debajo -->
                <div class="image-card">
                    <img src="../media/img7/Frame 14176.png" alt="Planta verde minimalista">
                </div>
            </article>

            <!-- Columna 2 -->

            <!-- Columna 3 -->
            <article class="grid-item">

            <!-- Columna 4 -->

                <div class="text-top">
